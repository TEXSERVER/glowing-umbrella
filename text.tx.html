<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Launcher Visual</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  background:#111;
  padding:40px;
  border-radius:20px;
  width:350px;
  text-align:center;
  box-shadow:0 0 30px black;
}

h2{
  color:#00c6ff;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:none;
  border-radius:6px;
  outline:none;
}

button{
  padding:12px 25px;
  border:none;
  border-radius:8px;
  background:#00c6ff;
  color:white;
  font-size:16px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
  background:#007bff;
}

.status{
  margin-top:15px;
  color:#00ff88;
}
</style>
</head>
<body>

<div class="container">
<h2>🚀 Launcher</h2>

<input type="text" id="linkInput" placeholder="Coloque o link aqui">

<button onclick="injectar()">🔥 Inject</button>

<div class="status" id="status"></div>

</div>

<script>

function injectar(){

  const link = document.getElementById("linkInput").value;

  if(!link){
    alert("Coloque um link!");
    return;
  }

  window.open(link, "_blank");

  document.getElementById("status").innerText =
  "✅ Link aberto via Inject (visual)";
}

</script>

</body>
</html>
